services:
  - type: web
    name: sermon-note
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python sermon.py
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: MAX_CHARS
        value: "48000"
